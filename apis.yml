aid: producthunt
name: Product Hunt
description: Product Hunt is a product discovery platform providing a GraphQL API
  for accessing product launches, votes, comments, maker profiles, and collection
  data from the Product Hunt community. Developers can query posts, users, topics,
  and collections, and with approval, perform write operations such as posting comments
  and managing goals.
